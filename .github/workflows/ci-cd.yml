name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:

  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: scrumio_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d scrumio_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run migrations
        env:
          DB_URL: jdbc:postgresql://localhost:5432/scrumio_db
          DB_USERNAME: admin
          DB_PASSWORD: admin
        run: ./gradlew flywayMigrate

      - name: Run tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/scrumio_db
          DB_USERNAME: admin
          DB_PASSWORD: admin
          AUTH_SERVICE_URL: http://localhost:3000
        run: ./gradlew test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/scrumio-backend:latest
            ghcr.io/${{ env.OWNER }}/scrumio-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/scrumio-frontend:latest
            ghcr.io/${{ env.OWNER }}/scrumio-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./go-auth-service
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/scrumio-auth-service:latest
            ghcr.io/${{ env.OWNER }}/scrumio-auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Redeploy services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway redeploy --service backend --yes
          railway redeploy --service frontend --yes
          railway redeploy --service auth-service --yes

  healthcheck:
    name: Post-deploy Healthcheck
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for backend
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Backend failed to become healthy"
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 6); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }} || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is healthy"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Frontend failed to become healthy"
          exit 1

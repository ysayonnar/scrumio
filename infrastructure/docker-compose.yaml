version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scrumio-postgres
    restart: always
    environment:
      POSTGRES_DB: scrumio_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: